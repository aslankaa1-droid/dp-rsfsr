<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="ЦПФСР.РФ">
  <defs>
    <linearGradient id="lg-grad-em" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B3D2E"/>
      <stop offset="100%" stop-color="#1F6B54"/>
    </linearGradient>
    <linearGradient id="lg-grad-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C5A572"/>
      <stop offset="100%" stop-color="#E4C892"/>
    </linearGradient>
  </defs>
  <!-- щит-обрамление -->
  <path d="M24 2 L42 8 V24 C42 34 34 42 24 46 C14 42 6 34 6 24 V8 Z"
        fill="url(#lg-grad-em)"
        stroke="url(#lg-grad-gold)" stroke-width="1.2"/>
  <!-- центральная вертикаль (колонна / устой) -->
  <rect x="22.5" y="11" width="3" height="26" fill="#E4C892" opacity="0.92"/>
  <!-- три горизонтальные «ступени» — Stage 1 / Stage 2 / Pilot -->
  <rect x="13" y="13" width="22" height="2.2" fill="#E4C892" opacity="0.85"/>
  <rect x="15" y="22" width="18" height="2.2" fill="#E4C892" opacity="0.75"/>
  <rect x="17" y="31" width="14" height="2.2" fill="#E4C892" opacity="0.65"/>
  <!-- акцент-точка (Pilot Light wedge) -->
  <circle cx="24" cy="6.5" r="1.6" fill="#E4C892"/>
</svg>
