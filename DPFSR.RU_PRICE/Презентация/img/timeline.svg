<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" width="1100" height="460">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F2733"/>
      <stop offset="100%" stop-color="#C9A14A"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="460" fill="url(#bg3)"/>
  <text x="550" y="46" text-anchor="middle" font-family="Manrope, sans-serif" font-weight="700" font-size="22" fill="#ECEEF2" letter-spacing="1">Дорожная карта 2025–2034</text>
  <text x="550" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8C95A4">Расход FCF · ключевые вехи · конверсия в зрелую фазу</text>

  <!-- Track -->
  <rect x="80" y="230" width="940" height="6" fill="url(#track)" rx="3"/>

  <!-- Year ticks -->
  <g font-family="IBM Plex Mono, monospace" font-size="11" fill="#8C95A4" text-anchor="middle">
    <g><circle cx="80" cy="233" r="6" fill="#C9A14A"/><text x="80" y="266">2025</text></g>
    <g><circle cx="184" cy="233" r="6" fill="#C9A14A"/><text x="184" y="266">2026</text></g>
    <g><circle cx="288" cy="233" r="6" fill="#C9A14A"/><text x="288" y="266">2027</text></g>
    <g><circle cx="393" cy="233" r="6" fill="#C9A14A"/><text x="393" y="266">2028</text></g>
    <g><circle cx="497" cy="233" r="6" fill="#C9A14A"/><text x="497" y="266">2029</text></g>
    <g><circle cx="601" cy="233" r="6" fill="#C9A14A"/><text x="601" y="266">2030</text></g>
    <g><circle cx="706" cy="233" r="6" fill="#C9A14A"/><text x="706" y="266">2031</text></g>
    <g><circle cx="810" cy="233" r="6" fill="#C9A14A"/><text x="810" y="266">2032</text></g>
    <g><circle cx="914" cy="233" r="6" fill="#C9A14A"/><text x="914" y="266">2033</text></g>
    <g><circle cx="1020" cy="233" r="6" fill="#C9A14A"/><text x="1020" y="266">2034</text></g>
  </g>

  <!-- Above-line milestones -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#ECEEF2">
    <g><line x1="80" y1="230" x2="80" y2="170" stroke="#C9A14A" stroke-dasharray="2,2"/><text x="80" y="160" text-anchor="middle">Series A · $15M</text></g>
    <g><line x1="184" y1="230" x2="184" y2="195" stroke="#C9A14A" stroke-dasharray="2,2"/><text x="184" y="185" text-anchor="middle">Серверная v1</text></g>
    <g><line x1="288" y1="230" x2="288" y2="125" stroke="#C9A14A" stroke-dasharray="2,2"/><text x="288" y="115" text-anchor="middle">Лицензия ЦБ + ФСТЭК</text></g>
    <g><line x1="497" y1="230" x2="497" y2="125" stroke="#C9A14A" stroke-dasharray="2,2"/><text x="497" y="115" text-anchor="middle">Stage 2 · полная конф.</text></g>
    <g><line x1="706" y1="230" x2="706" y2="160" stroke="#C9A14A" stroke-dasharray="2,2"/><text x="706" y="150" text-anchor="middle">EBITDA-маржа 71%</text></g>
    <g><line x1="1020" y1="230" x2="1020" y2="195" stroke="#C9A14A" stroke-dasharray="2,2"/><text x="1020" y="185" text-anchor="middle">Доля 18% · EV 63 млрд ₽</text></g>
  </g>

  <!-- Below-line FCF bars -->
  <g>
    <text x="80" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#B0202E">−1,02</text>
    <text x="184" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#B0202E">−1,06</text>
    <text x="288" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8C95A4">0,72</text>
    <text x="393" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8C95A4">5,68</text>
    <text x="497" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C9A14A">19,28</text>
    <text x="601" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C9A14A">35,02</text>
    <text x="706" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C9A14A">50,80</text>
    <text x="810" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C9A14A">62,50</text>
    <text x="914" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#C9A14A">71,80</text>
    <text x="1020" y="320" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#F2D88A">81,30</text>
    <text x="550" y="350" text-anchor="middle" font-family="Manrope, sans-serif" font-weight="600" font-size="12" fill="#8C95A4">FCF, млрд ₽</text>
  </g>

  <!-- Summary card -->
  <g transform="translate(80, 380)">
    <rect width="940" height="60" rx="4" fill="#1F2733" stroke="#C9CED6" stroke-opacity="0.18"/>
    <text x="20" y="32" font-family="Manrope, sans-serif" font-weight="700" font-size="14" fill="#ECEEF2">Σ FCF 2025–2034</text>
    <text x="220" y="32" font-family="IBM Plex Mono, monospace" font-weight="500" font-size="16" fill="#C9A14A">₽ 325,02 млрд</text>
    <text x="430" y="32" font-family="Manrope, sans-serif" font-weight="700" font-size="14" fill="#ECEEF2">PV (WACC 29,5%)</text>
    <text x="640" y="32" font-family="IBM Plex Mono, monospace" font-weight="500" font-size="16" fill="#C9A14A">₽ 55,67 млрд</text>
    <text x="820" y="32" font-family="IBM Plex Mono, monospace" font-weight="500" font-size="13" fill="#8C95A4">+ Multi-stage TV 7,78</text>
  </g>
</svg>
