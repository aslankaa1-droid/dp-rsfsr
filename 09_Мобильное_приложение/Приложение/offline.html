<!doctype html>
<html lang="ru" data-theme="daylight">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Нет соединения — ЦП РСФСР</title>
<meta name="theme-color" content="#0B2B5C">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="./icons/icon-192.png">
<link rel="stylesheet" href="../../_shared/brand.css">
<style>
html, body { height: 100%; margin: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: linear-gradient(135deg, #061A3A 0%, #0B2B5C 100%);
  color: #fff;
  display: grid; place-items: center;
  padding: 24px;
  text-align: center;
}
.offline {
  max-width: 420px;
}
.offline-icon {
  width: 120px; height: 120px;
  border-radius: 28px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
  display: grid; place-items: center;
  margin: 0 auto 28px;
}
.offline-icon svg { width: 56px; height: 56px; stroke: #C9A961; }
.offline h1 {
  font-family: 'Onest', sans-serif;
  font-weight: 800;
  font-size: 1.875rem;
  margin: 0 0 12px;
  letter-spacing: -.01em;
}
.offline p {
  font-size: 1rem;
  line-height: 1.55;
  color: rgba(255,255,255,.78);
  margin: 0 0 24px;
}
.offline-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  font-family: inherit;
  font-size: .9375rem;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.1);
  color: #fff;
  cursor: pointer;
  transition: background .2s ease;
}
.btn:hover { background: rgba(255,255,255,.16); }
.btn--primary {
  background: #C9A961;
  border-color: #C9A961;
  color: #0B2B5C;
}
.btn--primary:hover { background: #d8b870; }
.offline-status {
  margin-top: 20px;
  font-size: .8125rem;
  color: rgba(255,255,255,.5);
  font-family: 'JetBrains Mono', monospace;
}
@media (prefers-reduced-motion: no-preference) {
  .offline-icon { animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: .85; }
  }
}
</style>
</head>
<body>
<main class="offline" role="main" aria-labelledby="offline-title">
  <div class="offline-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>
  <h1 id="offline-title">Нет соединения</h1>
  <p>Приложение работает в офлайн-режиме. Подключитесь к сети, чтобы синхронизировать ЦФА, активы и операции.</p>
  <div class="offline-actions">
    <button class="btn btn--primary" type="button" onclick="location.reload()">Повторить</button>
    <a class="btn" href="./index.html">К главной</a>
  </div>
  <div class="offline-status" id="status" aria-live="polite">Проверяем соединение…</div>
</main>
<script>
(function () {
  const status = document.getElementById('status');
  function update() {
    if (navigator.onLine) {
      status.textContent = 'Соединение восстановлено · переходим…';
      setTimeout(() => location.replace('./index.html'), 600);
    } else {
      status.textContent = 'Офлайн · последнее обновление: ' + new Date().toLocaleTimeString('ru-RU');
    }
  }
  window.addEventListener('online', update);
  window.addEventListener('offline', update);
  update();
})();
</script>
</body>
</html>
